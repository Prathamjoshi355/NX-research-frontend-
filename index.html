<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NX Research | Elite Applied Research Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --research-blue: #0A2463;
        --innovation-orange: #FB8500;
        --neutral-gray: #F8F9FA;
        --strong-charcoal: #1E1E1E;
        --credibility-green: #06A77D;
        --attention-gold: #FFB703;
        --clear-red: #D62828;
      }

      body {
        font-family: 'Inter', sans-serif;
        color: var(--strong-charcoal);
        background-color: #FFFFFF;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Smooth Scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { 
        width: 8px; 
      }
      ::-webkit-scrollbar-track { 
        background: var(--neutral-gray); 
      }
      ::-webkit-scrollbar-thumb { 
        background: #cbd5e1; 
        border-radius: 10px; 
      }
      ::-webkit-scrollbar-thumb:hover { 
        background: #94a3b8; 
      }

      /* Utility Classes */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .shadow-3xl {
        box-shadow: 0 35px 60px -15px rgba(10, 36, 99, 0.15);
      }

      .card-hover { 
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; 
      }
      .card-hover:hover { 
        transform: translateY(-8px); 
        box-shadow: 0 25px 50px -12px rgba(10, 36, 99, 0.1); 
      }
      
      .oval-node {
        border-radius: 4rem;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
      }

      /* High-Fidelity Animations */
      @keyframes heroText {
        0% { transform: translateY(40px); opacity: 0; filter: blur(12px); }
        10% { transform: translateY(0); opacity: 1; filter: blur(0); }
        90% { transform: translateY(0); opacity: 1; filter: blur(0); }
        100% { transform: translateY(-40px); opacity: 0; filter: blur(12px); }
      }
      .animate-heroText {
        animation: heroText 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes drawLine {
        from { transform: scaleX(0); transform-origin: left; }
        to { transform: scaleX(1); transform-origin: left; }
      }
      .animate-draw {
        animation: drawLine 2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
      .animate-float {
        animation: float 5s ease-in-out infinite;
      }

      .text-shadow-hero {
        text-shadow: 0 4px 30px rgba(0,0,0,0.5), 0 0 80px rgba(0,0,0,0.3);
      }

      /* Transition Animations */
      .animate-in {
        animation-duration: 0.7s;
        animation-fill-mode: both;
        animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .fade-in { animation-name: fadeIn; }
      .zoom-in { animation-name: zoomIn; }
      .zoom-in-95 { animation-name: zoomIn95; }
      .slide-in-from-bottom { animation-name: slideInFromBottom; }
      .slide-in-from-bottom-10 { animation-name: slideInFromBottom10; }
      .slide-in-from-bottom-12 { animation-name: slideInFromBottom12; }
      .slide-in-from-top-12 { animation-name: slideInFromTop12; }
      .slide-in-from-left { animation-name: slideInFromLeft; }
      .slide-in-from-right { animation-name: slideInFromRight; }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      @keyframes zoomIn95 { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      @keyframes slideInFromBottom { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes slideInFromBottom10 { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes slideInFromBottom12 { from { transform: translateY(48px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes slideInFromTop12 { from { transform: translateY(-48px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes slideInFromLeft { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes slideInFromRight { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?deps=react@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.244.0?deps=react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
